<!-- Vocabu v39.9.0 -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vocabu</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&family=Outfit:wght@500;700&family=Kosugi&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #A0FFC3; --wrong: #FFABAB; --whitesmoke: #f8f8f8;
            --silver: #e0e0e0; --font-gray: #808080; --dark-gray: #444;
            --timer-coral: #FFABAB;
            --mint-green: #A0FFC3;
        }
        body { margin: 0; padding: 0; background: #fff; color: #333; font-family: 'Kosugi', sans-serif; font-weight: 400; height: 100vh; overflow: hidden; touch-action: manipulation; }
        .main-layout { display: flex; flex-direction: column; align-items: center; height: 100vh; padding: 0 20px; box-sizing: border-box; }
        
        /* Header */
        .app-header { width: 100%; max-width: 1100px; height: 75px; display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 15px; box-sizing: border-box; flex-shrink: 0; }
        .app-logo { font-size: 2.2rem; letter-spacing: 0.5px; color: var(--mint-green); font-family: 'Outfit'; font-weight: 700; flex: 1; text-align: center; line-height: 1; margin: 0; margin-bottom: -4px; }
        .btn-back { background: none; border: none; cursor: pointer; color: var(--font-gray); font-size: 0.95rem; min-width: 80px; font-family: 'Oswald'; visibility: hidden; padding: 0; text-align: left; line-height: 1; font-weight: 500; transition: color 0.2s; }
        .btn-back:hover { color: var(--accent); }
        .btn-back.visible { visibility: visible; }
        .outer-version { font-family: 'Oswald'; font-size: 0.95rem; color: var(--font-gray); min-width: 80px; text-align: right; line-height: 1; }

        /* Main Container */
        .game-main-container { width: 100%; max-width: 1100px; height: 380px; position: relative; background: var(--whitesmoke); border: 2px solid var(--silver); box-sizing: border-box; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .footer-row { width: 100%; max-width: 1100px; height: 40px; display: flex; justify-content: space-between; align-items: center; padding-top: 8px; box-sizing: border-box; flex-shrink: 0; }
        
        .screen { width: 100%; max-width: 1100px; }
        .hidden { display: none !important; }
        .index-container { display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; }
        .select-row { display: flex; align-items: center; gap: 12px; width: 100%; max-width: 400px; }
        .hidden-row { display: none !important; }
        .select-label { width: 80px; font-size: 0.85rem; color: var(--font-gray); }
        .custom-select { flex: 1; height: 40px; padding: 0 32px 0 10px; border: 1px solid var(--silver); border-radius: 0; font-size: 0.95rem; font-family: 'Kosugi'; background-color: #fff; appearance: none; -webkit-appearance: none; background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="%23A0FFC3" d="M2,10 L22,10 L12,18 Z"/></svg>'); background-repeat: no-repeat; background-position: right 10px center; background-size: 16px 16px; cursor: pointer; outline: none; transition: border-color 0.2s; }
        .custom-select:hover, .custom-select:focus { border-color: var(--accent); }
        
        .start-btn { display: none; background: none; border: none; font-size: 3.2rem; font-family: 'Oswald'; cursor: pointer; color: var(--font-gray); margin-top: 15px; transition: color 0.2s; }
        .start-btn:hover { color: var(--accent); }
        .start-btn.visible { display: block; }

        .overlay-nav { position: absolute; top: 0; bottom: 0; width: 100px; display: flex; align-items: center; z-index: 150; }
        .nav-text { cursor: pointer; color: var(--font-gray); font-size: 1.1rem; font-family: 'Oswald'; font-weight: 500; transition: color 0.2s; }
        .nav-text:hover { color: var(--accent); }
        .overlay-nav.left { left: 15px; justify-content: flex-start; } 
        .overlay-nav.right { right: 15px; justify-content: flex-end; }

        .flash-card { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 10; }
        .card-main-text { font-family: 'Outfit'; font-weight: 500; font-size: 5.5rem; }
        .card-sub-text { font-family: 'Outfit'; font-weight: 500; font-size: 2.3rem; text-align: center; padding: 0 12%; }
        
        #view-typing { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; padding-top: 15px; }
        #result-msg { height: 45px; font-size: 2rem; font-family: 'Outfit'; font-weight: 500; margin-bottom: 5px; }
        #typing-q { font-family: 'Kosugi'; font-size: 1.4rem; margin-bottom: 0px; height: 35px; text-align: center; }
        
        .input-area { display: flex; justify-content: center; align-items: flex-end; gap: 4px; }
        .char-box-display { width: 45px; height: 55px; font-size: 2.8rem; border-bottom: 3px solid #ccc; text-align: center; font-family: 'Outfit'; font-weight: 500; }
        .char-box-display.active { border-bottom-color: var(--accent); }
        .master-typing-input { position: absolute; z-index: 100; background: none; text-align: center; font-family: 'Outfit'; font-weight: 500; outline: none; border: none; }
        .master-typing-input.hard-mode { border-bottom: 3px solid #ccc; min-width: 400px; height: 55px; font-size: 2.8rem; }
        
        .footer-left { flex: 3; display: flex; align-items: center; gap: 20px; }
        .footer-center { flex: 1; display: flex; justify-content: center; align-items: center; gap: 25px; }
        .footer-right { flex: 2; display: flex; justify-content: flex-end; align-items: center; gap: 25px; }
        .q-meta { font-size: 0.82rem; color: var(--font-gray); font-weight: 700; margin: 0; white-space: nowrap; font-family: 'Oswald', sans-serif; letter-spacing: 0.3px; }
        
        .tool-btn { background: none; border: none; color: var(--font-gray); cursor: pointer; font-size: 0.95rem; font-family: 'Oswald'; padding: 0; transition: color 0.2s; outline: none; }
        .tool-btn:hover { color: var(--accent); }
        .btn-active { box-shadow: 0 4px 0 0 var(--accent); color: var(--dark-gray); }
        
        /* Shuffle Button Custom */
        .btn-shuffle { color: var(--font-gray); }
        .btn-shuffle:hover, .btn-shuffle.active { color: var(--accent); }

        .sound-wrapper { display: flex; align-items: center; gap: 8px; font-family: 'Oswald'; font-size: 0.95rem; position: relative; color: var(--font-gray); }
        .sound-opt { cursor: pointer; position: relative; z-index: 1; transition: color 0.2s; }
        .sound-opt:hover { color: var(--accent); }
        .toggle-line { position: absolute; bottom: -4px; height: 2px; background-color: var(--accent); transition: all 0.3s; pointer-events: none; }

        #timer-box, #realtime-score { position:absolute; top:15px; font-family:'Oswald'; color:var(--timer-coral); font-size:4rem; z-index:60; }
        #timer-box { left:20px; } #realtime-score { right:20px; }
    </style>
</head>
<body>
<div class="main-layout">
    <header class="app-header">
        <button id="header-back" class="btn-back" onclick="app.backToIndex()">Index</button>
        <div class="app-logo">Vocabu</div>
        <div class="outer-version">v39.9.0</div>
    </header>

    <div id="screen-index" class="screen">
        <div class="index-container">
            <div class="select-row"><span class="select-label">モード</span><select id="mode-select" class="custom-select" onchange="app.onStep(1)"><option value="" disabled selected>選択してください</option><option value="card">フラッシュカード</option><option value="typing">タイピング</option><option value="timeattack">タイムアタック</option></select></div>
            <div id="row-lang" class="select-row hidden-row"><span class="select-label">言 語</span><select id="lang-select" class="custom-select" onchange="app.onStep(2)"><option value="" disabled selected>選択してください</option><option value="EN">英語 → 日本語</option><option value="JP">日本語 → 英語</option></select></div>
            <div id="row-pos" class="select-row hidden-row"><span class="select-label">品 詞</span><select id="pos-select" class="custom-select" onchange="app.onStep(3)"></select></div>
            <div id="row-grade" class="select-row hidden-row"><span class="select-label">学 年</span><select id="grade-select" class="custom-select" onchange="app.onStep(4)"></select></div>
            <div id="row-unit" class="select-row hidden-row"><span class="select-label">Unit</span><select id="unit-select" class="custom-select" onchange="app.onStep(5)"></select></div>
            <div id="row-count" class="select-row hidden-row"><span class="select-label" id="count-label">問題数</span><select id="count-select" class="custom-select" onchange="app.onStep(6)"></select></div>
            <button id="index-start-btn" class="start-btn" onclick="app.startGame()">START</button>
        </div>
    </div>

    <div id="screen-game" class="screen hidden">
        <div class="game-main-container">
            <div id="timer-box" class="hidden"></div>
            <div id="realtime-score" class="hidden"></div>
            <div id="nav-left" class="overlay-nav left"><span class="nav-text" onclick="app.prev()">BACK</span></div>
            <div id="view-card" class="flash-card" onclick="app.flipCard()"><div id="fc-content"></div></div>
            <div id="view-typing" class="hidden">
                <div id="result-msg"></div>
                <div id="typing-q"></div>
                <div id="input-area-wrapper" style="position:relative; height:65px; display:flex; align-items:flex-end; justify-content:center; width:100%; margin-top:55px;">
                    <input type="url" id="master-input" class="master-typing-input" autocapitalize="none" autocomplete="off" autocorrect="off" spellcheck="false">
                    <div id="input-area" class="input-area"></div>
                </div>
                <div style="height:60px; display:flex; gap:30px; margin-top:8px;"><button class="tool-btn" style="font-size:0.95rem;" onclick="app.checkTyping()">CHECK</button><button class="tool-btn" style="font-size:0.95rem;" onclick="app.giveUp()">GIVE UP</button></div>
            </div>
            <div id="view-time-result" class="hidden">
                <div style="font-family:'Oswald'; font-size:1.8rem; color:var(--font-gray); margin-bottom:10px;">TIME UP</div>
                <div id="time-score-display" style="font-size:6rem; color:var(--accent); font-family:'Outfit';">0 / 0</div>
                <button class="tool-btn" style="margin-top:30px; font-size:1.2rem;" onclick="app.backToIndex()">BACK TO INDEX</button>
            </div>
            <div id="nav-right" class="overlay-nav right"><span class="nav-text" onclick="app.next()">NEXT</span></div>
        </div>
        <div class="footer-row">
            <div class="footer-left">
                <p id="q-meta" class="q-meta"></p>
                <button id="shuffle-btn" class="tool-btn btn-shuffle" onclick="app.toggleShuffle()">Shuffle</button>
            </div>
            <div class="footer-center">
                <button id="btn-easy" class="tool-btn" onclick="app.setDiff('easy')">Easy</button>
                <button id="btn-hard" class="tool-btn" onclick="app.setDiff('hard')">Hard</button>
                <button id="flip-btn" class="tool-btn" onclick="app.flipCard()">Flip</button>
            </div>
            <div class="footer-right">
                <button class="tool-btn" style="font-size:0.95rem;" onclick="app.listenAgain()">Listen Again</button>
                <div class="sound-wrapper">
                    <span>Sound:</span>
                    <span id="label-on" class="sound-opt" onclick="app.toggleSound(false)">ON</span>
                    <span id="label-off" class="sound-opt" onclick="app.toggleSound(true)">OFF</span>
                    <div id="toggle-line" class="toggle-line"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
class App {
    constructor() {
        this.db = []; this.gameQueue = []; this.currentIndex = 0;
        this.currentMode = 'card'; this.difficulty = 'easy'; this.isMuted = false;
        this.isShuffle = false;
        this.synth = window.speechSynthesis;
        this.timer = null; this.correctCount = 0; this.answerCount = 0;
        this.isGivenUp = false;
        this.hasAnsweredCorrectly = false;
        this.hasEvaluatedWrong = false;
        this.audioCtx = null;
        this.isEvaluating = false; 
        this.posFull = { "名":"名詞","動":"動詞","形":"形容詞","副":"副詞","前":"前置詞","接":"接続詞","代":"代名詞","助":"助動詞","連":"連語" };
        
        this.unitGroupsByGrade = {
            "1": {
                "Unit 0": ["U0", "SaL0"],
                "Unit 1": ["U1-1", "U1-2", "U1-3", "SaL1"],
                "Unit 2": ["U2-1", "U2-2", "U2-3", "SaL2"],
                "Unit 3": ["U3-1", "U3-2", "U3-3", "SaL3"],
                "Unit 4": ["U4-1", "U4-2", "U4-3", "SaL4"],
                "Stage Activity 1": ["SA1"],
                "Unit 5": ["U5-1", "U5-2", "U5-RT"],
                "Unit 6": ["U6-1", "U6-2", "U6-RT", "RLE2", "GfC5"],
                "Unit 7": ["U7-1", "U7-2", "U7-RT", "RLE3"],
                "Unit 8": ["U8-1", "U8-2", "U8-RT", "RLE4"],
                "Stage Activity 2": ["SA2"],
                "Unit 9": ["U9-1", "U9-2", "U9-RT", "RLE5"],
                "Unit 10": ["U10-1", "U10-2", "U10-RT"],
                "Stage Activity 3": ["SA3"],
                "Let's Read": ["LR"]
            },
            "2": {
                "Unit 0": ["U0"],
                "Unit 1": ["U1-1", "U1-2", "U1-RT1", "R1-RT2"],
                "Unit 2": ["U2-1", "U2-2", "U2-RT1", "R2-RT2", "RLE2"],
                "Unit 3": ["U3-1", "U3-2", "U3-RT1", "R3-RT2"],
                "Stage Activity 1": ["SA1"],
                "Let's Read 1": ["LR1(p.44)", "LR1(p.45)", "LR1(p.46)", "LR1(p.47)", "LR1"],
                "Unit 4": ["U4-1", "U4-2", "U4-RT1", "R4-RT2", "RLE4"],
                "Unit 5": ["U5-1", "U5-2", "U5-RT1", "R5-RT2"],
                "Unit 6": ["U6-1", "U6-2", "U6-RT1", "R6-RT2", "RLE6"],
                "Stage Activity 2": ["SA2"],
                "Let's Read 2": ["LR2(p.84)", "LR2(p.85)", "LR2(p.86)", "LR2"],
                "Unit 7": ["U7-1", "U7-2", "U7-RT1", "R7-RT2", "RLE7"],
                "Stage Activity 3": ["SA3"],
                "Let's Read 3": ["LR3(p.104)", "LR3(p.105)", "LR3(p.106)", "LR3(p.107)", "LR3"]
            },
            "3": {
                "Unit 0": ["U0"],
                "Unit 1": ["U1-1", "U1-2", "U1-RT1", "U1-RT2"],
                "Unit 2": ["U2-1", "U2-2", "U2-RT1", "U2-RT2"],
                "Unit 3": ["U3-1", "U3-2", "U3-RT1", "U3-RT2", "RLE3"],
                "Stage Activity 1": ["SA1"],
                "Let's Read 1": ["LR1(p.46)", "LR1(p.47)", "LR1(p.48)", "LR1(p.49)", "LR1"],
                "Unit 4": ["U4-1", "U4-2", "U4-RT1", "U4-RT2", "RLE4"],
                "Unit 5": ["U5-1", "U5-2", "U5-RT1", "RLE5"],
                "Stage Activity 2": ["SA2"],
                "Unit 6": ["U6-1", "U6-2", "U6-RT1"],
                "Stage Activity 3": ["SA3"],
                "Let's Read 2": ["LR2(p.92)", "LR2(p.93)", "LR2(p.94)", "LR2"],
                "Let's Read 3": ["LR2(p.96)", "LR2(p.97)", "LR2(p.98)", "LR2(p.99)"],
                "Further Reading": ["Further Reading"]
            }
        };
        
        window.addEventListener('DOMContentLoaded', () => this.init());
    }

    async init() { 
        this.initFaviconTheme();

        try {
            const response = await fetch(`data/words.csv?v=${Date.now()}`);
            if (!response.ok) throw new Error('CSVファイルの読み込みに失敗しました。');
            const csvText = await response.text();
            this.parseCSV(csvText);
        } catch (error) {
            console.error(error);
            alert(error.message);
            return;
        }

        const master = document.getElementById('master-input');
        master.addEventListener('input', () => {
            if (/[Ａ-Ｚａ-ｚ０-９！-～]/.test(master.value)) {
                master.value = master.value.replace(/[Ａ-Ｚａ-ｚ０-９！-～]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
            }
            this.hasEvaluatedWrong = false; 
            if (this.difficulty === 'easy') this.syncEasyDisplay();
        });
        window.addEventListener('keydown', (e) => {
            if (document.getElementById('screen-game').classList.contains('hidden')) return;
            if (e.key === 'ArrowLeft') this.prev();
            if (e.key === 'ArrowRight') this.next();
            if (e.key === 'Enter') (this.currentMode === 'card') ? this.flipCard() : this.checkTyping();
        });
        this.setDiff('easy'); this.updateSoundUI();
    }

    getGroupName(grade, unitStr) {
        if (!unitStr) return "IGNORE";
        const rawTarget = unitStr.trim();
        if (rawTarget.toUpperCase().includes("WR")) return "IGNORE";
        
        const normalize = (s) => s.replace(/\s+/g, '').replace(/\(.*?\)/g, '').toLowerCase();
        const normTarget = normalize(rawTarget);
        const targetGrades = (grade && grade !== 'ALL') ? [String(grade)] : ["1", "2", "3"];

        for (const g of targetGrades) {
            const groups = this.unitGroupsByGrade[g];
            if (!groups) continue;
            for (const [groupName, matchArray] of Object.entries(groups)) {
                if (matchArray.includes(rawTarget)) return groupName;
                for (const item of matchArray) {
                    if (normalize(item) === normTarget) return groupName;
                }
            }
        }
        return "IGNORE";
    }

    initFaviconTheme() {
        const updateIconForce = (e) => {
            const oldIcons = document.querySelectorAll("link[rel*='icon']");
            oldIcons.forEach(el => el.remove());
            const newLink = document.createElement('link');
            newLink.rel = 'icon'; newLink.type = 'image/svg+xml';
            const fillColor = e.matches ? '%23ffffff' : '%2324292e';
            newLink.href = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16"><path fill="${fillColor}" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38v-1.44c-2.22.48-2.69-1.07-2.69-1.07-.36-.92-.88-1.17-.88-1.17-.72-.48.05-.47.05-.47.8.06 1.22.84 1.22.84.71 1.22 1.88.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.03 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.28.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48v2.18c0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>`;
            document.getElementsByTagName('head')[0].appendChild(newLink);
        };
        const darkModeQuery = window.matchMedia('(prefers-color-scheme: dark)');
        updateIconForce(darkModeQuery);
        darkModeQuery.addEventListener('change', updateIconForce);
    }

    playSE(type) {
        if (this.isMuted) return;
        try {
            if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const ctx = this.audioCtx;
            if (type === 'correct') {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.connect(gain); gain.connect(ctx.destination);
                const now = ctx.currentTime;
                osc.frequency.setValueAtTime(987.77, now); osc.frequency.setValueAtTime(1318.51, now + 0.08);
                gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
                osc.start(now); osc.stop(now + 0.45);
            } else if (type === 'wrong') {
                const osc1 = ctx.createOscillator(); const osc2 = ctx.createOscillator(); const gain = ctx.createGain();
                osc1.type = 'sawtooth'; osc2.type = 'sawtooth'; osc1.connect(gain); osc2.connect(gain); gain.connect(ctx.destination);
                const now = ctx.currentTime;
                osc1.frequency.setValueAtTime(140, now); osc2.frequency.setValueAtTime(143, now);
                gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                osc1.start(now); osc2.start(now); osc1.stop(now + 0.3); osc2.stop(now + 0.3);
            }
        } catch (e) { console.error("SE play failed", e); }
    }

    parseCSV(text) {
        const lines = text.trim().split('\n').slice(1);
        this.db = lines.map(line => {
            const parts = []; let current = ""; let inQuotes = !1;
            for(let char of line) {
                if(char === '"') inQuotes = !inQuotes;
                else if(char === ',' && !inQuotes) { parts.push(current); current = ""; }
                else { current += char; }
            }
            parts.push(current);
            const clean = parts.map(v => v.trim());
            return { no:clean[0], en:clean[1], pos:clean[2], jp:clean[3], grade:clean[4], page:clean[5]||"0", unit:clean[6]||"-" };
        }).filter(i => i.en);
    }

    onStep(step) {
        this.currentMode = document.getElementById('mode-select').value;
        if (step === 1) {
            this.hideRows(['row-lang','row-pos','row-grade','row-unit','row-count']);
            document.getElementById('count-label').innerText = (this.currentMode === 'timeattack') ? "時 感" : "問題数";
            if (this.currentMode === 'card') this.showRow('row-lang'); else { this.renderPos(); this.showRow('row-pos'); }
        } else if (step === 2) { this.renderPos(); this.showRow('row-pos'); }
        else if (step === 3) { this.renderGrade(); this.showRow('row-grade'); }
        else if (step === 4) { this.renderUnit(); this.showRow('row-unit'); }
        else if (step === 5) { this.renderCount(); this.showRow('row-count'); }
        else if (step === 6) document.getElementById('index-start-btn').classList.add('visible');
    }

    showRow(id) { document.getElementById(id).classList.remove('hidden-row'); }
    hideRows(ids) { ids.forEach(id => document.getElementById(id).classList.add('hidden-row')); document.getElementById('index-start-btn').classList.remove('visible'); }

    getFilteredData() {
        let f = [...this.db];
        const pos = document.getElementById('pos-select').value;
        const gd = document.getElementById('grade-select').value;
        const utGroup = document.getElementById('unit-select').value;
        
        if(pos && pos !== 'ALL') f = f.filter(i => (this.posFull[i.pos]||i.pos) === pos);
        if(gd && gd !== 'ALL') f = f.filter(i => i.grade == gd);
        
        f = f.filter(i => {
            const groupName = this.getGroupName(i.grade, i.unit);
            if (groupName === "IGNORE") return false;
            if (utGroup && utGroup !== 'ALL') return groupName === utGroup;
            return true;
        });
        return f;
    }

    renderPos() {
        const sel = document.getElementById('pos-select');
        sel.innerHTML = '<option value="" disabled selected>選択してください</option><option value="ALL">すべて ('+this.db.length+'語)</option>';
        const posList = [...new Set(this.db.map(i => this.posFull[i.pos] || i.pos))];
        posList.forEach(p => {
            const count = this.db.filter(i => (this.posFull[i.pos]||i.pos) === p).length;
            sel.innerHTML += `<option value="${p}">${p} (${count}語)</option>`;
        });
    }

    renderGrade() {
        const sel = document.getElementById('grade-select');
        const pos = document.getElementById('pos-select').value;
        let base = (pos && pos !== 'ALL') ? this.db.filter(i => (this.posFull[i.pos]||i.pos) === pos) : this.db;
        sel.innerHTML = '<option value="" disabled selected>選択してください</option><option value="ALL">すべて ('+base.length+'語)</option>';
        [1,2,3].forEach(g => {
            const count = base.filter(i => i.grade == g).length;
            if(count > 0) sel.innerHTML += `<option value="${g}">${g}年 (${count}語)</option>`;
        });
    }

    renderUnit() {
        const sel = document.getElementById('unit-select');
        const pos = document.getElementById('pos-select').value;
        const gd = document.getElementById('grade-select').value;
        
        let base = [...this.db];
        if(pos && pos !== 'ALL') base = base.filter(i => (this.posFull[i.pos]||i.pos) === pos);
        if(gd && gd !== 'ALL') base = base.filter(i => i.grade == gd);
        
        const targetGrades = (gd && gd !== 'ALL') ? [String(gd)] : ["1", "2", "3"];
        let orderedGroups = [];
        targetGrades.forEach(g => {
            const groups = this.unitGroupsByGrade[g];
            if (groups) {
                Object.keys(groups).forEach(groupName => {
                    if (!orderedGroups.includes(groupName)) orderedGroups.push(groupName);
                });
            }
        });
        
        const totalValidCount = base.filter(i => this.getGroupName(i.grade, i.unit) !== "IGNORE").length;
        sel.innerHTML = '<option value="" disabled selected>選択してください</option><option value="ALL">すべて ('+totalValidCount+'語)</option>';
        
        orderedGroups.forEach(groupName => {
            const count = base.filter(i => this.getGroupName(i.grade, i.unit) === groupName).length;
            if(count > 0) sel.innerHTML += `<option value="${groupName}">${groupName} (${count}語)</option>`;
        });
    }

    renderCount() {
        const sel = document.getElementById('count-select');
        const filtered = this.getFilteredData();
        const total = filtered.length;
        sel.innerHTML = '<option value="" disabled selected>選択してください</option>';
        if (this.currentMode === 'timeattack') {
            [1,2,3,5].forEach(m => sel.innerHTML += `<option value="${m}">${m}分</option>`);
        } else {
            [10,30,50,100].forEach(v => { if(total >= v) sel.innerHTML += `<option value="${v}">${v}問</option>`; });
            [total].forEach(v => { sel.innerHTML += `<option value="ALL">すべて (${v}語)</option>`; });
        }
    }

    startGame() {
        let f = this.getFilteredData();
        
        // シャッフル状態に応じた配列の初期並び替え
        if (this.isShuffle) {
            this.gameQueue = f.sort(() => Math.random() - 0.5);
        } else {
            this.gameQueue = f.sort((a, b) => parseInt(a.no) - parseInt(b.no));
        }

        const ct = document.getElementById('count-select').value;
        if(ct !== 'ALL' && this.currentMode !== 'timeattack') this.gameQueue = this.gameQueue.slice(0, parseInt(ct));

        this.correctCount = 0; this.answerCount = 0;
        document.getElementById('screen-index').classList.add('hidden');
        document.getElementById('screen-game').classList.remove('hidden');
        document.getElementById('header-back').classList.add('visible');
        
        const isT = (this.currentMode !== 'card');
        document.getElementById('view-card').classList.toggle('hidden', isT);
        document.getElementById('view-typing').classList.toggle('hidden', !isT);
        document.getElementById('btn-easy').classList.toggle('hidden', !isT);
        document.getElementById('btn-hard').classList.toggle('hidden', !isT);
        document.getElementById('flip-btn').classList.toggle('hidden', isT);

        if(this.currentMode === 'timeattack') {
            this.startTimer(parseInt(ct)*60);
            document.getElementById('realtime-score').innerText = '0 / 0';
            document.getElementById('realtime-score').classList.remove('hidden');
            document.getElementById('nav-left').style.opacity = '0.3';
        } else {
            document.getElementById('nav-left').style.opacity = '1';
        }
        this.currentIndex = 0; this.loadQuestion();
        this.updateSoundUI();
        this.updateShuffleUI();
    }

    toggleShuffle() {
        this.isShuffle = !this.isShuffle;
        this.updateShuffleUI();

        if (this.gameQueue.length === 0) return;

        // 現在表示中の単語を退避し、それ以外の残りのキューを並び替える
        const currentWord = this.gameQueue[this.currentIndex];
        let remain = this.gameQueue.filter((_, idx) => idx !== this.currentIndex);

        if (this.isShuffle) {
            remain = remain.sort(() => Math.random() - 0.5);
        } else {
            remain = remain.sort((a, b) => parseInt(a.no) - parseInt(b.no));
        }

        // 新しいキューの先頭に現在の単語を固定し、インデックスを0へリセット
        this.gameQueue = [currentWord, ...remain];
        this.currentIndex = 0;
        
        // メタテキストの更新
        const meta = document.getElementById('q-meta');
        if (meta) {
            const posName = this.posFull[currentWord.pos] || currentWord.pos;
            meta.innerText = `${this.currentIndex + 1} / ${this.gameQueue.length} | No.${currentWord.no} | ${posName} | ${currentWord.grade}年 | P.${currentWord.page} | Unit ${currentWord.unit}`;
        }
    }

    updateShuffleUI() {
        const btn = document.getElementById('shuffle-btn');
        if (btn) btn.classList.toggle('active', this.isShuffle);
    }

    loadQuestion() {
        if(this.gameQueue.length === 0) return;
        this.isGivenUp = false; 
        this.hasAnsweredCorrectly = false;
        this.hasEvaluatedWrong = false;
        this.isEvaluating = false;
        const q = this.gameQueue[this.currentIndex];
        const meta = document.getElementById('q-meta');
        
        if (meta) {
            const posName = this.posFull[q.pos] || q.pos;
            meta.innerText = `${this.currentIndex + 1} / ${this.gameQueue.length} | No.${q.no} | ${posName} | ${q.grade}年 | P.${q.page} | Unit ${q.unit}`;
        }

        if(this.currentMode !== 'card') this.setupTyping(); else { this.isFlipped = false; this.updateCard(); }
    }

    setupTyping() {
        const q = this.gameQueue[this.currentIndex];
        const master = document.getElementById('master-input');
        const area = document.getElementById('input-area');
        document.getElementById('result-msg').innerText = '';
        document.getElementById('typing-q').innerText = q.jp;
        area.innerHTML = ''; master.value = '';
        if(this.difficulty === 'easy') {
            master.className = 'master-typing-input'; master.style.opacity = 0;
            [...q.en].forEach(c => {
                if(/[a-zA-Z0-9]/.test(c)) {
                    const b = document.createElement('div'); b.className = 'char-box-display'; area.appendChild(b);
                } else {
                    const s = document.createElement('span'); s.innerText = (c === ' ' ? '\u00A0' : c); s.style.fontSize="2.5rem"; area.appendChild(s);
                }
            });
            this.syncEasyDisplay();
        } else { master.className = 'master-typing-input hard-mode'; master.style.opacity = 1; }
        setTimeout(() => master.focus(), 50);
    }

    syncEasyDisplay() {
        const master = document.getElementById('master-input');
        const boxes = document.querySelectorAll('.char-box-display');
        boxes.forEach((b, i) => {
            b.innerText = master.value[i] || '';
            b.classList.toggle('active', i === master.value.length);
        });
    }

    checkTyping() {
        if (this.isGivenUp) return;
        if (this.hasAnsweredCorrectly || this.hasEvaluatedWrong || this.isEvaluating) return; 

        this.isEvaluating = true;
        const q = this.gameQueue[this.currentIndex];
        const master = document.getElementById('master-input');
        
        const normalize = (s) => s.toLowerCase().replace(/[^a-z0-9]/g, '');
        const inputVal = normalize(master.value);
        const correctVal = normalize(q.en);
        
        const isCorrect = (inputVal === correctVal);

        if(isCorrect) {
            document.getElementById('result-msg').innerHTML = '<span style="color:var(--accent)">○ Correct</span>';
            this.answerCount++; this.correctCount++; this.hasAnsweredCorrectly = true;
        } else {
            document.getElementById('result-msg').innerHTML = '<span style="color:var(--wrong)">× Wrong</span>';
            this.answerCount++; this.hasEvaluatedWrong = true;
        }

        if(this.currentMode === 'timeattack') {
            document.getElementById('realtime-score').innerText = `${this.correctCount} / ${this.answerCount}`;
        }

        setTimeout(() => {
            if(isCorrect) { this.playSE('correct'); this.speak(q.en); }
            else { this.playSE('wrong'); }
        }, 400);

        setTimeout(() => { this.isEvaluating = false; }, 450);
    }

    giveUp() {
        if (this.isGivenUp) return;
        this.isGivenUp = true; 
        const q = this.gameQueue[this.currentIndex];
        const master = document.getElementById('master-input');
        document.getElementById('result-msg').innerText = ''; 
        if(this.difficulty === 'easy') {
            master.value = [...q.en].filter(c => /[a-zA-Z0-9]/.test(c)).join('');
            this.syncEasyDisplay();
        } else { master.value = q.en; }
        this.speak(q.en);
    }

    flipCard() { this.isFlipped = !this.isFlipped; this.updateCard(); }
    updateCard() {
        const q = this.gameQueue[this.currentIndex];
        const langMode = document.getElementById('lang-select').value;
        const isEn = (langMode === 'EN' && !this.isFlipped) || (langMode === 'JP' && this.isFlipped);
        const content = document.getElementById('fc-content');
        content.innerText = isEn ? q.en : q.jp;
        content.className = isEn ? 'card-main-text' : 'card-sub-text';
        if(isEn && !this.isMuted) this.speak(q.en);
    }

    setDiff(d) {
        this.difficulty = d;
        document.getElementById('btn-easy').classList.toggle('btn-active', d==='easy');
        document.getElementById('btn-hard').classList.toggle('btn-active', d==='hard');
        if(this.gameQueue.length > 0 && this.currentMode !== 'card') this.setupTyping();
    }

    toggleSound(mute) { this.isMuted = mute; this.updateSoundUI(); }
    updateSoundUI() {
        const line = document.getElementById('toggle-line');
        const target = document.getElementById(this.isMuted ? 'label-off' : 'label-on');
        if (target && line) {
            line.style.width = `${target.offsetWidth}px`;
            line.style.left = `${target.offsetLeft}px`;
        }
    }

    startTimer(sec) {
        const box = document.getElementById('timer-box'); box.classList.remove('hidden');
        this.timer = setInterval(() => {
            sec--; box.innerText = `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
            if(sec<=0) { clearInterval(this.timer); this.showTimeResult(); }
        }, 1000);
    }

    showTimeResult() {
        document.getElementById('view-typing').classList.add('hidden');
        document.getElementById('view-time-result').classList.remove('hidden');
        document.getElementById('time-score-display').innerText = `${this.correctCount} / ${this.answerCount}`;
    }

    next() { this.currentIndex = (this.currentIndex + 1) % this.gameQueue.length; this.loadQuestion(); }
    prev() { 
        if (this.currentMode === 'timeattack') return;
        this.currentIndex = (this.currentIndex - 1 + this.gameQueue.length) % this.gameQueue.length; 
        this.loadQuestion(); 
    }

    speak(t) {
        if(this.isMuted) return;
        this.synth.cancel();
        const u = new SpeechSynthesisUtterance(t);
        const voices = this.synth.getVoices();
        const femaleVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google US English')) || 
                           voices.find(v => v.lang === 'en-US' && (v.name.includes('Female') || v.name.includes('female'))) ||
                           voices.find(v => v.lang === 'en-US') ||
                           voices.find(v => v.lang.startsWith('en'));
        if(femaleVoice) u.voice = femaleVoice;
        u.lang = 'en-US'; u.rate = 0.9; u.pitch = 1.0;
        this.synth.speak(u);
    }

    listenAgain() { if(this.gameQueue.length > 0) this.speak(this.gameQueue[this.currentIndex].en); }
    
    backToIndex() {
        clearInterval(this.timer);
        this.gameQueue = [];
        this.currentIndex = 0;
        this.isGivenUp = false;
        this.hasAnsweredCorrectly = false;
        this.hasEvaluatedWrong = false;
        this.isEvaluating = false;
        
        document.getElementById('screen-game').classList.add('hidden');
        document.getElementById('view-time-result').classList.add('hidden');
        document.getElementById('screen-index').classList.remove('hidden');
        document.getElementById('header-back').classList.remove('visible');
        document.getElementById('timer-box').classList.add('hidden');
        document.getElementById('realtime-score').classList.add('hidden');
        
        const modes = ['mode-select', 'lang-select', 'pos-select', 'grade-select', 'unit-select', 'count-select'];
        modes.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.selectedIndex = 0;
        });

        document.getElementById('pos-select').innerHTML = '<option value="" disabled selected>選択してください</option>';
        document.getElementById('grade-select').innerHTML = '<option value="" disabled selected>選択してください</option>';
        document.getElementById('unit-select').innerHTML = '<option value="" disabled selected>選択してください</option>';
        document.getElementById('count-select').innerHTML = '<option value="" disabled selected>選択してください</option>';

        this.hideRows(['row-lang','row-pos','row-grade','row-unit','row-count']);
    }
}

const app = new App();
</script>
</body>
</html>
